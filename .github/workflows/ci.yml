name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test deps
        run: pip install pytest==8.4.1 bandit==1.8.6 numpy==2.4.6
      - name: Install gitleaks
        run: |
          go install github.com/zricethezav/gitleaks/v8@v8.30.1
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Unit tests
        run: pytest -q
      - name: Classifier smoke test
        run: python3 bin/recall-classifier.py --test
      - name: Bandit scan
        run: bandit -r bin
      - name: Gitleaks scan
        run: gitleaks detect --source . --redact --config .gitleaks.toml --no-banner
